    background-size: cover;
    background-position: center;
    opacity: 0.4;
    transition: transform 0.1s ease-out;
    will-change: transform
    }
.atmos-layer-gradient {

.atmos-layer-mist {
    position: absolute;
    inset: -10%;
    width: 120%;
    height: 120%;
    background-image: radial-gradient(circle at center, rgba(164, 201, 255, 0.05) 0%, transparent 60%);
    z-index: 2;
    animation: driftMist 20s infinite alternate ease-in-out;
    transition: transform 0.1s ease-out;
    will-change: transform
    }
/* Rain Particles Container */
.rain-container {
    position: absolute;
    inset: 0;
    z-index: 3;
    overflow: hidden;

/* Subtle drop shadow for extreme legibility */
.text-shadow-crisp {

    }
@keyframes driftMist {
    0% {
        transform: translate(0, 0) scale(1);
        } 50% {
        transform: translate(2%, 1%) scale(1.05);
        } 100% {
        transform: translate(-1%, 2%) scale(1);
        }
    }
@keyframes fallRain {
    0% {
        transform: translateY(-10vh) rotate(15deg);
        opacity: 0;
        } 10% {
        opacity: 0.6;
        } 90% {
        opacity: 0.6;
        } 100% {
        transform: translateY(110vh) rotate(15deg);
        opacity: 0;
        }
    }
.rain-drop {
    position: absolute;
    background: linear-gradient(to bottom, transparent, rgba(164, 201, 255, 0.6));
    width: 1px;
    height: 40px;

<script>
    // Generate rain particles
    document.addEventListener("DOMContentLoaded", () => {
        const rainContainer = document.getElementById('rain-layer');
        const numDrops = 40;
        
        for (let i = 0; i < numDrops; i++) {
            const drop = document.createElement('div');
            drop.classList.add('rain-drop');
            
            // Randomize position, animation delay, and duration
            const left = Math.random() * 120 - 10; // -10% to 110%
            const delay = Math.random() * 2; // 0 to 2s
            const duration = 0.5 + Math.random() * 0.5; // 0.5s to 1.0s
            
            drop.style.left = `${left}%`;
            drop.style.animationDelay = `${delay}s`;
            drop.style.animationDuration = `${duration}s`;
            
            // Randomize opacity slightly for depth
            drop.style.opacity = 0.2 + Math.random() * 0.4;
            
            rainContainer.appendChild(drop);
        }

        // Parallax effect
        const parallaxBase = document.getElementById('parallax-base');
        const parallaxMist = document.getElementById('parallax-mist');
        
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;
        
        // Use requestAnimationFrame for smooth drifting
        function animate() {
            // Lerp for smooth movement
            mouseX += (targetX - mouseX) * 0.05;
            mouseY += (targetY - mouseY) * 0.05;
            
            // Apply slight transformations based on position
            if (parallaxBase) {
                parallaxBase.style.transform = `translate(${mouseX * 15}px, ${mouseY * 15}px)`;
            }
            if (parallaxMist) {
                parallaxMist.style.transform = `translate(${mouseX * -20}px, ${mouseY * -20}px)`;
            }
            
            requestAnimationFrame(animate);
        }
        
        animate();

        // Optional mouse movement for desktop
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            // Normalize to -0.5 to 0.5
            targetX = x - 0.5;
            targetY = y - 0.5;
        });

        // Optional device orientation for mobile
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                // Clamp values
                let gamma = e.gamma; // left to right
                let beta = e.beta; // front to back
                
                if (gamma > 30) gamma = 30;
                if (gamma < -30) gamma = -30;
                if (beta > 60) beta = 60;
                if (beta < 0) beta = 0;
                
                targetX = gamma / 60; // rough normalization
                targetY = (beta - 30) / 60;
            });
        }
    });
</script>
