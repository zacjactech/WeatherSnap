<style>
        .viewfinder-corner {
            position: absolute;
            width: 32px;
            height: 32px;
            border: 2px solid #a4c9ff;
            opacity: 0.8;
            transition: all 0.3s ease;
        }
        .viewfinder-corner.tl { top: 0; left: 0; border-right: none; border-bottom: none; }
        .viewfinder-corner.tr { top: 0; right: 0; border-left: none; border-bottom: none; }
        .viewfinder-corner.bl { bottom: 0; left: 0; border-right: none; border-top: none; }
        .viewfinder-corner.br { bottom: 0; right: 0; border-left: none; border-top: none; }
        
        .shutter-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: transparent;
            border: 4px solid #dee1f9;
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .shutter-btn::after {
            content: '';
            position: absolute;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #dee1f9;
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .shutter-btn:active {
            transform: scale(0.95);
        }
        .shutter-btn:active::after {
            transform: scale(0.9);
        }
    </style>
<style>

<script>
        // Simple mechanical haptic feedback simulation
        document.getElementById('captureBtn').addEventListener('click', function() {
            if (navigator.vibrate) {
                navigator.vibrate(50); // Short, sharp mechanical vibration
            }
            
            // Visual feedback - shutter flash
            const flash = document.createElement('div');
            flash.className = 'absolute inset-0 bg-white z-[100] opacity-0 transition-opacity duration-150 pointer-events-none';
            document.body.appendChild(flash);
            
            // Trigger animation
            requestAnimationFrame(() => {
                flash.style.opacity = '0.8';
                setTimeout(() => {
                    flash.style.opacity = '0';
                    setTimeout(() => flash.remove(), 150);
                }, 50);
            });
        });
    </script>
