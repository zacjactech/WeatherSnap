<!DOCTYPE html>

<style>
        body { background-color: #0e1323; color: #dee1f9; }
        .bg-rainy-ambience {
            background: linear-gradient(to bottom, rgba(14, 19, 35, 0.8), rgba(14, 19, 35, 1)), 
                        url('https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background min-h-screen flex flex-col font-body-md text-on-background antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="sticky top-0 w-full z-50 flex justify-between items-center px-margin-mobile py-stack-md bg-surface">
<button class="text-primary hover:bg-surface-container-high transition-colors active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">search</span>
</button>
<h1 class="font-headline-md-mobile text-headline-md-mobile md:font-headline-md md:text-headline-md font-bold tracking-tight text-primary">WeatherSnap</h1>
<button class="hover:bg-surface-container-high transition-colors active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
<img alt="Researcher Profile" class="w-8 h-8 rounded-full border border-outline-variant" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBd4X6xCdhz8cQhUzKkjXfHV4fHWzjzViMuonMvFEP9UtVs0O2sbnVeF6zv4CXiWtZS-9x8FPszNYz63A5oB7f0aOIq102liqwa9YmAblBIY2A_U4ovPzd2OiYnKbd08MOZq4tICsoBiPS8WNZG37KRKE6v9zw06jp5WfysYC7QvIZeVqNZzuNA8u57AOA4mEZpWj8YFpthRllR8RqIZqrn-HRpPyZqB7mWRGaGjWNP04cZU2HAss1wz1ruPLD3cuy7ioUwXi2xWeM"/>
</button>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col pb-24">
<!-- Hero Section -->
<section class="relative bg-rainy-ambience w-full h-[530px] flex flex-col items-center justify-center px-margin-mobile border-b border-surface-container" data-alt="A dark, cinematic atmospheric weather background showing heavy mist and rain in a dense evergreen forest. The scene uses a deep navy and slate color palette, with soft, diffused lighting piercing through the fog. The mood is moody, professional, and slightly ominous, matching a high-precision meteorological observation theme. No text overlay in the image itself.">
<div class="z-10 flex flex-col items-center text-center gap-stack-sm mb-stack-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface">Seattle, WA</h2>
<p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">location_on</span> Field Station 04
                </p>
</div>
<div class="z-10 flex flex-col items-center justify-center">
<div class="flex items-start">
<span class="font-display-temp-mobile text-display-temp-mobile md:font-display-temp md:text-display-temp text-primary font-bold tracking-tight">12</span>
<span class="font-headline-lg text-headline-lg text-primary mt-2">°C</span>
</div>
<div class="flex items-center gap-4 mt-stack-sm">
<span class="bg-surface-container-high px-4 py-1 rounded-full font-label-caps text-label-caps text-on-surface">HEAVY RAIN</span>
<span class="font-metadata text-metadata text-on-surface-variant">H: 14° L: 9°</span>
</div>
</div>
<!-- Search Bar Overlay -->
<div class="absolute bottom-stack-lg w-full px-margin-mobile md:max-w-md">
<div class="bg-surface-container border-b-2 border-primary rounded-t-lg flex items-center px-4 py-3 shadow-lg">
<span class="material-symbols-outlined text-outline-variant mr-3">search</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface w-full font-metadata text-metadata placeholder:text-outline-variant" placeholder="Search observation point..." type="text"/>
</div>
</div>
</section>
<!-- Observation Grid -->
<section class="px-margin-mobile py-stack-lg md:px-margin-tablet max-w-7xl mx-auto w-full">
<h3 class="font-label-caps text-label-caps text-on-surface-variant mb-stack-md tracking-widest">CURRENT OBSERVATION METRICS</h3>
<div class="grid grid-cols-2 md:grid-cols-4 gap-gutter md:gap-stack-md">
<!-- Metric Card 1 -->
<div class="bg-surface-container border border-outline-variant rounded-xl p-4 flex flex-col gap-2">
<div class="flex items-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">water_drop</span>
<span class="font-label-caps text-label-caps">HUMIDITY</span>
</div>
<span class="font-headline-md text-headline-md text-on-surface">94%</span>
</div>
<!-- Metric Card 2 -->
<div class="bg-surface-container border border-outline-variant rounded-xl p-4 flex flex-col gap-2">
<div class="flex items-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">air</span>
<span class="font-label-caps text-label-caps">WIND</span>
</div>
<div class="flex items-baseline gap-1">
<span class="font-headline-md text-headline-md text-on-surface">24</span>
<span class="font-metadata text-metadata text-on-surface-variant">km/h NW</span>
</div>
</div>
<!-- Metric Card 3 -->
<div class="bg-surface-container border border-outline-variant rounded-xl p-4 flex flex-col gap-2">
<div class="flex items-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">compress</span>
<span class="font-label-caps text-label-caps">PRESSURE</span>
</div>
<div class="flex items-baseline gap-1">
<span class="font-headline-md text-headline-md text-on-surface">1008</span>
<span class="font-metadata text-metadata text-on-surface-variant">hPa</span>
</div>
</div>
<!-- Metric Card 4 -->
<div class="bg-surface-container border border-outline-variant rounded-xl p-4 flex flex-col gap-2">
<div class="flex items-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">visibility</span>
<span class="font-label-caps text-label-caps">VISIBILITY</span>
</div>
<div class="flex items-baseline gap-1">
<span class="font-headline-md text-headline-md text-on-surface">2.4</span>
<span class="font-metadata text-metadata text-on-surface-variant">km</span>
</div>
</div>
</div>
<!-- Action Area -->
<div class="mt-stack-lg flex justify-center">
<button class="bg-[#4A90E2] text-[#F4F7FB] px-8 py-4 rounded-full font-label-caps text-label-caps tracking-wider flex items-center gap-3 hover:bg-primary-container transition-colors active:scale-95 shadow-[0_4px_14px_0_rgba(74,144,226,0.39)]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">edit_document</span>
                    CREATE WEATHER REPORT
                </button>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-surface-container md:hidden">
<button class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-5 py-1 active:scale-90 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-label-caps text-label-caps mt-1 text-[10px]">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90">
<span class="material-symbols-outlined">photo_camera</span>
<span class="font-label-caps text-label-caps mt-1 text-[10px]">Camera</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90">
<span class="material-symbols-outlined">assignment</span>
<span class="font-label-caps text-label-caps mt-1 text-[10px]">Reports</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-caps text-label-caps mt-1 text-[10px]">Settings</span>
</button>
</nav>
</body></html>
